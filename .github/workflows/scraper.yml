name: WVV Daten aktualisieren

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Repository auschecken
        uses: actions/checkout@v4

      - name: 🟢 Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Abhängigkeiten installieren
        run: npm install --no-package-lock

      - name: 🌐 Playwright Browser installieren
        run: npx playwright install chromium --with-deps

      - name: 🏐 Scraper ausführen
        run: node scraper.js

      - name: 💾 Daten ins Repository speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tvhoerde-data.json
          git diff --staged --quiet || git commit -m "🏐 WVV-Daten aktualisiert: $(date '+%d.%m.%Y %H:%M')"
          git push
